apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "userswarm-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  {{- if .Values.chartRevision }}
  annotations:
    crawbl.ai/chart-revision: {{ .Values.chartRevision | quote }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "userswarm-operator.name" . }}
  template:
    metadata:
      {{- if .Values.chartRevision }}
      annotations:
        crawbl.ai/chart-revision: {{ .Values.chartRevision | quote }}
      {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "userswarm-operator.name" . }}
{{- with .Values.podLabels }}
{{ toYaml . | indent 8 }}
{{- end }}
    spec:
      serviceAccountName: {{ include "userswarm-operator.serviceAccountName" . }}
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{- range .Values.imagePullSecrets }}
        - name: {{ .name }}
{{- end }}
{{- end }}
      containers:
        - name: userswarm-operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: USERSWARM_BOOTSTRAP_IMAGE
              value: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            - name: USERSWARM_RUNTIME_VAULT_ENABLED
              value: {{ printf "%v" .Values.vault.enabled | quote }}
            - name: USERSWARM_RUNTIME_VAULT_AUTH_PATH
              value: {{ .Values.vault.authPath | quote }}
            - name: USERSWARM_RUNTIME_VAULT_ROLE
              value: {{ .Values.vault.role | quote }}
            - name: USERSWARM_RUNTIME_VAULT_PRE_POPULATE_ONLY
              value: {{ printf "%v" .Values.vault.prePopulateOnly | quote }}
            - name: USERSWARM_RUNTIME_VAULT_SECRET_PATH
              value: {{ .Values.vault.secretPath | quote }}
            - name: USERSWARM_RUNTIME_VAULT_SECRET_KEY
              value: {{ .Values.vault.secretKey | quote }}
            - name: USERSWARM_RUNTIME_VAULT_FILE_NAME
              value: {{ .Values.vault.fileName | quote }}
            - name: USERSWARM_RUNTIME_VAULT_AGENT_REQUESTS_CPU
              value: {{ .Values.vault.agentResources.requests.cpu | quote }}
            - name: USERSWARM_RUNTIME_VAULT_AGENT_REQUESTS_MEM
              value: {{ .Values.vault.agentResources.requests.memory | quote }}
            - name: USERSWARM_RUNTIME_VAULT_AGENT_LIMITS_CPU
              value: {{ .Values.vault.agentResources.limits.cpu | quote }}
            - name: USERSWARM_RUNTIME_VAULT_AGENT_LIMITS_MEM
              value: {{ .Values.vault.agentResources.limits.memory | quote }}
          args:
            - operator
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - name: http-metrics
              containerPort: 8080
            - name: http-probe
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: http-probe
          readinessProbe:
            httpGet:
              path: /readyz
              port: http-probe
{{- with .Values.resources }}
          resources:
{{ toYaml . | indent 12 }}
{{- end }}
