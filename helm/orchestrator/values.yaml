image:
  repository: registry.digitalocean.com/crawbl/crawbl-orchestrator
  tag: dev
  pullPolicy: Always
imagePullSecrets:
  - name: crawbl-docr
replicaCount: 1
serviceAccount:
  create: false
  name: orchestrator
podLabels: {}
podAnnotations: {}
resources: {}
secretEnv:
  existingSecretName: orchestrator-vault-secrets
migration:
  enabled: true
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  activeDeadlineSeconds: 600
service:
  type: ClusterIP
  port: 7171
config:
  environment: test
  authAllowDevTokens: true
  authDevTokenPrefix: dev
  legal:
    termsOfService: "https://crawbl.com/terms"
    privacyPolicy: "https://crawbl.com/privacy"
    termsOfServiceVersion: v1
    privacyPolicyVersion: v1
  database:
    host: backend-postgresql
    port: "5432"
    name: crawbl
    schema: orchestrator
    sslmode: disable
    maxOpenConnections: "20"
    maxIdleConnections: "10"
    connMaxLifetime: 5m
  firebase:
    credentialsFile: ""
  runtime:
    driver: userswarm
    fakeReplyPrefix: "Fake runtime reply"
    namespace: swarms-dev
    image: "registry.digitalocean.com/crawbl/zeroclaw@sha256:07f4695739c0caa9d052818ce0f3fb183bef1fff94b328178a1f8fcc5c4bf1a8"
    imagePullSecretName: crawbl-docr
    storageSize: 2Gi
    storageClassName: ""
    defaultProvider: openai
    defaultModel: gpt-5.4
    envSecretName: runtime-openai-secrets
    tomlOverrides: ""
    pollTimeout: 60s
    pollInterval: 2s
    port: "42617"
redis:
  addr: "backend-redis-master:6379"
firebaseSecret:
  enabled: false
  name: ""
  key: firebase.json
  mountPath: /var/run/secrets/crawbl/firebase
httpRoute:
  enabled: true
  hostnames:
    - dev.api.crawbl.com
  pathPrefix: /v1
  gateway:
    name: public-edge
    namespace: envoy-gateway-system
    sectionName: https
