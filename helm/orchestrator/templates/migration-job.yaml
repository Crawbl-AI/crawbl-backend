{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "orchestrator.fullname" . }}-orchestrator-migrate
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "orchestrator.labels" . | indent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
{{ include "orchestrator.selectorLabels" . | indent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "orchestrator.serviceAccountName" . }}
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{- range .Values.imagePullSecrets }}
        - name: {{ .name }}
{{- end }}
{{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /app/orchestrator
          args:
            - migrate
            - --svc=orchestrator
          env:
            - name: CRAWBL_DATABASE_HOST
              value: {{ .Values.config.database.host | quote }}
            - name: CRAWBL_DATABASE_PORT
              value: {{ .Values.config.database.port | quote }}
            - name: CRAWBL_DATABASE_NAME
              value: {{ .Values.config.database.name | quote }}
            - name: CRAWBL_DATABASE_SCHEMA
              value: {{ .Values.config.database.schema | quote }}
            - name: CRAWBL_DATABASE_SSLMODE
              value: {{ .Values.config.database.sslmode | quote }}
          envFrom:
            - secretRef:
                name: {{ required "secretEnv.existingSecretName is required" .Values.secretEnv.existingSecretName }}
{{- with .Values.resources }}
          resources:
{{ toYaml . | indent 12 }}
{{- end }}
{{- end }}
