{{- if eq .Values.config.runtime.driver "userswarm" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "orchestrator.fullname" . }}-userswarm
  labels:
{{ include "orchestrator.labels" . | indent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "orchestrator.fullname" . }}-userswarm
subjects:
  - kind: ServiceAccount
    name: {{ include "orchestrator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
