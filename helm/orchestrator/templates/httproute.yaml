{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "orchestrator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "orchestrator.labels" . | indent 4 }}
spec:
{{- if .Values.httpRoute.hostnames }}
  hostnames:
{{ toYaml .Values.httpRoute.hostnames | indent 4 }}
{{- end }}
  parentRefs:
    - name: {{ .Values.httpRoute.gateway.name }}
      namespace: {{ .Values.httpRoute.gateway.namespace }}
{{- if .Values.httpRoute.gateway.sectionName }}
      sectionName: {{ .Values.httpRoute.gateway.sectionName }}
{{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.httpRoute.pathPrefix | quote }}
      backendRefs:
        - name: {{ include "orchestrator.fullname" . }}
          port: {{ .Values.service.port }}
{{- range .Values.httpRoute.additionalPaths }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ . | quote }}
      backendRefs:
        - name: {{ include "orchestrator.fullname" $ }}
          port: {{ $.Values.service.port }}
{{- end }}
{{- end }}
