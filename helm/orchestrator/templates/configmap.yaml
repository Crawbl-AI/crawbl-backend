apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "orchestrator.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "orchestrator.labels" . | indent 4 }}
data:
  CRAWBL_SERVER_PORT: {{ printf "%v" .Values.service.port | quote }}
  CRAWBL_ENVIRONMENT: {{ .Values.config.environment | quote }}
  CRAWBL_AUTH_ALLOW_DEV_TOKENS: {{ printf "%v" .Values.config.authAllowDevTokens | quote }}
  AUTH_DEV_TOKEN_PREFIX: {{ .Values.config.authDevTokenPrefix | quote }}
  CRAWBL_DATABASE_HOST: {{ .Values.config.database.host | quote }}
  CRAWBL_DATABASE_PORT: {{ .Values.config.database.port | quote }}
  CRAWBL_DATABASE_NAME: {{ .Values.config.database.name | quote }}
  CRAWBL_DATABASE_SCHEMA: {{ .Values.config.database.schema | quote }}
  CRAWBL_DATABASE_SSLMODE: {{ .Values.config.database.sslmode | quote }}
  CRAWBL_DATABASE_MAX_OPEN_CONNECTIONS: {{ .Values.config.database.maxOpenConnections | quote }}
  CRAWBL_DATABASE_MAX_IDLE_CONNECTIONS: {{ .Values.config.database.maxIdleConnections | quote }}
  CRAWBL_DATABASE_CONN_MAX_LIFETIME: {{ .Values.config.database.connMaxLifetime | quote }}
  CRAWBL_LEGAL_TERMS_OF_SERVICE: {{ .Values.config.legal.termsOfService | quote }}
  CRAWBL_LEGAL_PRIVACY_POLICY: {{ .Values.config.legal.privacyPolicy | quote }}
  CRAWBL_LEGAL_TERMS_OF_SERVICE_VERSION: {{ .Values.config.legal.termsOfServiceVersion | quote }}
  CRAWBL_LEGAL_PRIVACY_POLICY_VERSION: {{ .Values.config.legal.privacyPolicyVersion | quote }}
  CRAWBL_RUNTIME_DRIVER: {{ .Values.config.runtime.driver | quote }}
  CRAWBL_RUNTIME_FAKE_REPLY_PREFIX: {{ .Values.config.runtime.fakeReplyPrefix | quote }}
  CRAWBL_RUNTIME_NAMESPACE: {{ .Values.config.runtime.namespace | quote }}
  CRAWBL_RUNTIME_IMAGE: {{ .Values.config.runtime.image | quote }}
  CRAWBL_RUNTIME_IMAGE_PULL_SECRET: {{ .Values.config.runtime.imagePullSecretName | quote }}
  CRAWBL_RUNTIME_STORAGE_SIZE: {{ .Values.config.runtime.storageSize | quote }}
  CRAWBL_RUNTIME_STORAGE_CLASS_NAME: {{ .Values.config.runtime.storageClassName | quote }}
  CRAWBL_RUNTIME_DEFAULT_PROVIDER: {{ .Values.config.runtime.defaultProvider | quote }}
  CRAWBL_RUNTIME_DEFAULT_MODEL: {{ .Values.config.runtime.defaultModel | quote }}
  CRAWBL_RUNTIME_ENV_SECRET_NAME: {{ .Values.config.runtime.envSecretName | quote }}
  CRAWBL_RUNTIME_TOML_OVERRIDES: {{ .Values.config.runtime.tomlOverrides | quote }}
  CRAWBL_RUNTIME_POLL_TIMEOUT: {{ .Values.config.runtime.pollTimeout | quote }}
  CRAWBL_RUNTIME_POLL_INTERVAL: {{ .Values.config.runtime.pollInterval | quote }}
  CRAWBL_RUNTIME_PORT: {{ .Values.config.runtime.port | quote }}
  CRAWBL_REDIS_ADDR: {{ .Values.redis.addr | quote }}
{{- if .Values.firebaseSecret.enabled }}
  CRAWBL_FIREBASE_CREDENTIALS_FILE: {{ printf "%s/%s" .Values.firebaseSecret.mountPath .Values.firebaseSecret.key | quote }}
{{- else if .Values.config.firebase.credentialsFile }}
  CRAWBL_FIREBASE_CREDENTIALS_FILE: {{ .Values.config.firebase.credentialsFile | quote }}
{{- end }}
