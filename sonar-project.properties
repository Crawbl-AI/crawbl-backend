# SonarQube project configuration for crawbl-backend.
# The sonar-scanner CLI reads this file automatically from the project root.
# NOTE: SonarCloud automatic analysis uses API-configured settings, not this file.
# Exclusions are synced to SonarCloud via: scripts/setup-sonar-profile.sh
#
# Server URL and token are passed via environment variables:
#   SONARQUBE_URL  -> sonar.host.url
#   SONARQUBE_TOKEN -> sonar.token
# These are set in .env and injected by the crawbl CLI.

# --- Project identity ---
sonar.projectKey=crawbl-backend
sonar.projectName=crawbl-backend

# --- Language ---
sonar.language=go

# --- Source layout ---
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.sourceEncoding=UTF-8

# --- Exclusions ---
# Generated code, vendored dependencies, protobuf output, CRD types,
# test fixtures, and build cache — none of these are first-party source.
sonar.exclusions=\
  vendor/**,\
  api/**,\
  **/*.pb.go,\
  **/*.pb.gw.go,\
  **/*_generated.go,\
  **/zz_generated.*.go,\
  **/deepcopy_generated.go,\
  **/testdata/**,\
  **/*_test.go,\
  .cache/**,\
  .omc/**,\
  config/**,\
  dockerfiles/**,\
  migrations/**,\
  proto/**,\
  .github/**,\
  scripts/**,\
  **/*.sh,\
  **/*.sql,\
  **/Dockerfile*,\
  **/dockerfile*,\
  **/*.dockerfile

sonar.test.exclusions=\
  **/*_generated.go,\
  **/*.pb.go,\
  vendor/**

# --- External issue reports ---
# gosec outputs a SonarQube-compatible JSON report (security/vulnerabilities).
# staticcheck outputs Go-specific bugs, performance, and simplification issues.
# Both are imported as external issues by the scanner.
sonar.externalIssuesReportPaths=gosec-report.json,staticcheck-report.json

# --- Duplication detection ---
sonar.cpd.go.minimumTokens=100

# --- Issue suppression ---
# Suppress SQL and shell rules on migration files and scripts.
# Belt-and-suspenders alongside sonar.exclusions for stale-cache resilience.
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=plsql:*
sonar.issue.ignore.multicriteria.e1.resourceKey=migrations/**
sonar.issue.ignore.multicriteria.e2.ruleKey=shelldre:*
sonar.issue.ignore.multicriteria.e2.resourceKey=scripts/**
sonar.issue.ignore.multicriteria.e3.ruleKey=shelldre:*
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.sh

# --- Quality gate ---
# Report quality gate status but don't fail the scan.
sonar.qualitygate.wait=false
