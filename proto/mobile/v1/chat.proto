syntax = "proto3";

package crawbl.mobile.v1;

option go_package = "github.com/Crawbl-AI/crawbl-backend/internal/generated/proto/mobile/v1;mobilev1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "mobile/v1/agent.proto";

// ContentAgent is the agent summary embedded in delegation message content.
message ContentAgent {
  string id = 1;
  string name = 2;
  string role = 3;
  string slug = 4;
  string avatar = 5;
  optional string status = 6;
}

// ActionItemResponse represents a clickable action button in a message.
message ActionItemResponse {
  string id = 1;
  string label = 2;
  string style = 3;
}

// AttachmentResponse represents a file attached to a message.
// Unbounded numeric fields use double so proto3 JSON encodes them as numbers
// (not strings) and the Flutter client decodes them as num with 53-bit
// precision. Genuinely bounded fields keep int32.
message AttachmentResponse {
  string id = 1;
  string name = 2;
  string url = 3;
  string type = 4;
  double size = 5;
  string mime_type = 6;
  optional int32 duration = 7;
}

// QuestionOptionPayload is a selectable answer option for a question.
message QuestionOptionPayload {
  string id = 1;
  string label = 2;
}

// QuestionItemPayload is a single question in an interactive card.
message QuestionItemPayload {
  string id = 1;
  string prompt = 2;
  string mode = 3;
  repeated QuestionOptionPayload options = 4;
  bool allow_custom = 5;
}

// QuestionTurnPayload groups questions shown as one turn block.
message QuestionTurnPayload {
  int32 index = 1;
  string label = 2;
  repeated QuestionItemPayload questions = 3;
}

// QuestionAnswerPayload captures a user response to a question.
message QuestionAnswerPayload {
  string question_id = 1;
  repeated string option_ids = 2;
  string custom_text = 3;
}

// ArtifactRefPayload is the compact artifact reference embedded in chat messages.
message ArtifactRefPayload {
  string artifact_id = 1;
  int32 version = 2;
  string title = 3;
  string content_type = 4;
  string action = 5;
  string agent_slug = 6;
  string agent_name = 7;
  string status = 8;
}

// WorkflowRefPayload is the compact workflow reference embedded in chat messages.
message WorkflowRefPayload {
  string workflow_id = 1;
  string execution_id = 2;
  string name = 3;
  string status = 4;
}

// MessageContentPayload represents the content of a message.
message MessageContentPayload {
  string type = 1;
  string text = 2;
  string title = 3;
  string description = 4;
  repeated ActionItemResponse actions = 5;
  optional string selected_action_id = 6;
  string tool = 7;
  optional string state = 8;
  string query = 9;
  google.protobuf.Struct args = 10;
  optional ContentAgent from = 11;
  optional ContentAgent to = 12;
  optional string status = 13;
  string task_preview = 14;
  repeated QuestionTurnPayload turns = 15;
  repeated QuestionAnswerPayload answers = 16;
  optional ArtifactRefPayload artifact = 17;
  optional WorkflowRefPayload workflow = 18;
}

// MessageResponse represents a message in API responses.
message MessageResponse {
  string id = 1;
  string conversation_id = 2;
  string role = 3;
  MessageContentPayload content = 4;
  string status = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  optional string local_id = 8;
  optional AgentResponse agent = 9;
  repeated AttachmentResponse attachments = 10;
}

// MessagesPaginationResponse provides cursor-based pagination metadata for message lists.
message MessagesPaginationResponse {
  string next_scroll_id = 1;
  string prev_scroll_id = 2;
  bool has_next = 3;
  bool has_prev = 4;
}

// MessagesListResponse is the paginated response for listing messages.
message MessagesListResponse {
  repeated MessageResponse messages = 1;
  MessagesPaginationResponse pagination = 2;
}

// ConversationResponse represents a conversation in API responses.
message ConversationResponse {
  string id = 1;
  string type = 2;
  string title = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  int32 unread_count = 6;
  optional AgentResponse agent = 7;
  optional MessageResponse last_message = 8;
}

// CreateConversationRequest represents the request body for creating a new conversation.
message CreateConversationRequest {
  string type = 1;
  string agent_id = 2;
  optional string title = 3;
}

// MentionPayload represents an @-mention of an agent in a message.
// Integer fields use int32 (not int64) so proto3 JSON encodes them as numbers,
// not strings. The Flutter client decodes these as num.
message MentionPayload {
  string agent_id = 1;
  string agent_name = 2;
  int32 offset = 3;
  int32 length = 4;
}

// SendMessageRequest represents the request body for sending a new message.
message SendMessageRequest {
  string local_id = 1;
  MessageContentPayload content = 2;
  repeated AttachmentResponse attachments = 3;
  repeated MentionPayload mentions = 4;
}

// ActionCardRequest represents the request body for responding to an action card.
message ActionCardRequest {
  string action_id = 1;
}

// MessageAnswersRequest is the payload for the Socket.IO `message.answers` event.
message MessageAnswersRequest {
  string workspace_id = 1;
  string message_id = 2;
  string local_id = 3;
  repeated QuestionAnswerPayload answers = 4;
}
