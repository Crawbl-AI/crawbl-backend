# ZeroClaw Operator Configuration Reference
#
# File: config/zeroclaw.yaml  (mounted as a ConfigMap in the webhook pod)
#
# PURPOSE
# -------
# This file controls cluster-wide defaults for every ZeroClaw agent runtime that
# the userswarm-webhook provisions. Values here are baked into the per-user
# config.toml at provisioning time. They act as the operator layer — you set
# policy once here, and every new UserSwarm inherits it automatically.
#
# HOW IT WORKS
#   1. The webhook loads this file at startup via zeroclaw.LoadConfig().
#   2. For each UserSwarm, BuildConfigTOML() starts from these defaults, then
#      applies per-user overrides from the UserSwarm CR spec.
#   3. The resulting config.toml is written to a ConfigMap.
#   4. An init container merges that ConfigMap into the PVC-backed live config
#      inside the user's pod (only operator-managed keys are touched).
#
# OVERRIDE LAYERS (lowest to highest priority)
#   1. Built-in Go defaults (DefaultConfig() in internal/zeroclaw/config.go)
#   2. This file  ← you are here
#   3. UserSwarm CR spec fields (spec.config.defaultProvider / defaultModel /
#      defaultTemperature)
#   4. UserSwarm CR spec.config.tomlOverrides (raw TOML escape hatch)
#
# STRUCTURE
#   Each top-level key maps to a Go struct in internal/zeroclaw/types.go:
#     defaults     → ZeroClawDefaults
#     httpRequest  → ZeroClawHTTPRequest
#     webFetch     → ZeroClawWebFetch
#     webSearch    → ZeroClawWebSearch
#     autonomy     → ZeroClawAutonomy
#
# If this file does not exist, all values fall back to the Go built-in defaults
# shown below.

# ==============================================================================
# defaults  (ZeroClawDefaults)
#
# Global provider and reliability settings applied to every agent session.
# Also settable per-user via: UserSwarm spec.config.defaultTemperature
# ==============================================================================
defaults:
  # temperature: Sampling temperature for LLM completions.
  #   Range: 0.0 (deterministic) – 2.0 (very creative)
  #   Lower values produce more focused, consistent output.
  #   Higher values increase variety and creativity.
  #   Also settable per-user via: UserSwarm spec.config.defaultTemperature
  #   Default: 0.7
  temperature: 0.7

  # timeout: Maximum seconds to wait for a single LLM provider response.
  #   Applies to most tool calls and completion requests.
  #   If the provider does not respond within this window, the request fails
  #   and providerRetries kicks in.
  #   Default: 30
  timeout: 30

  # shortTimeout: Shorter deadline used for fast-path operations such as
  #   web search queries where a slow result is worse than no result.
  #   Must be <= timeout.
  #   Default: 15
  shortTimeout: 15

  # providerRetries: How many times ZeroClaw retries a failed provider call
  #   before surfacing the error to the agent.
  #   Each retry is preceded by a providerBackoffMs delay.
  #   Set to 0 to disable retries (fail-fast mode).
  #   Default: 2
  providerRetries: 2

  # providerBackoffMs: Milliseconds to wait between provider retry attempts.
  #   Applies after each failed attempt up to providerRetries.
  #   Increase this for rate-limited providers.
  #   Default: 500
  providerBackoffMs: 500

# ==============================================================================
# httpRequest  (ZeroClawHTTPRequest)
#
# Controls the http_request tool — the agent's ability to make arbitrary HTTP
# calls to external APIs and services.
# ==============================================================================
httpRequest:
  # maxResponseSize: Maximum bytes ZeroClaw will read from an HTTP response body.
  #   Responses larger than this are truncated before being passed to the agent.
  #   Prevents runaway memory consumption from large API responses.
  #   Default: 1000000 (1 MB)
  maxResponseSize: 1000000

  # allowedDomains: Allowlist of domains the http_request tool may contact.
  #   Each entry is a hostname or hostname glob.
  #   Use ["*"] to permit all outbound HTTP (default, open cluster).
  #   Restrict this list to prevent agents from reaching internal infrastructure
  #   or untrusted external hosts.
  #   Examples:
  #     - "*"                   # allow everything (default)
  #     - "api.openai.com"      # specific hostname
  #     - "*.googleapis.com"    # wildcard subdomain
  #   Default: ["*"]
  allowedDomains:
    - "*"

# ==============================================================================
# webFetch  (ZeroClawWebFetch)
#
# Controls the web_fetch tool — the agent's ability to read and extract content
# from web pages by URL.
# ==============================================================================
webFetch:
  # maxResponseSize: Maximum bytes ZeroClaw will read from a fetched web page.
  #   Intentionally smaller than httpRequest.maxResponseSize because web pages
  #   are often much larger than API responses.
  #   Responses are truncated at this limit before being summarised for the agent.
  #   Default: 500000 (500 KB)
  maxResponseSize: 500000

# ==============================================================================
# webSearch  (ZeroClawWebSearch)
#
# Controls the web_search_tool — the agent's ability to query the internet for
# current information, news, and real-time data.
# ==============================================================================
webSearch:
  # provider: Which search backend to use.
  #   Valid values:
  #     "duckduckgo"  — Privacy-respecting, no API key required (default)
  #     "brave"       — Brave Search; requires BRAVE_API_KEY in the runtime env
  #     "searxng"     — Self-hosted SearXNG instance; requires searxng_instance_url
  #                     set via tomlOverrides or the web_search TOML section
  #   Default: "duckduckgo"
  provider: duckduckgo

  # maxResults: Maximum number of search result entries returned per query.
  #   Higher values give the agent more context but increase token usage.
  #   Range: 1–20 (ZeroClaw enforces an internal cap)
  #   Default: 5
  maxResults: 5

# ==============================================================================
# autonomy  (ZeroClawAutonomy)
#
# Controls what the agent can do without asking the user for approval.
# This is the most security-sensitive section of the operator config.
#
# The autonomy rules below are compiled into the [autonomy] section of the
# per-user config.toml. ZeroClaw evaluates them at runtime for every tool call.
# ==============================================================================
autonomy:
  # allowedCommands: Shell commands the agent may run via the shell tool
  #   without user approval (subject to autonomy.level and workspace_only).
  #   Only the command name (argv[0]) is checked — arguments are not restricted
  #   here; use forbiddenPaths to block path-based abuse.
  #   Add commands only if you trust them to operate safely in a shared cluster.
  #   Default list is intentionally read-only / inspection tools only.
  allowedCommands:
    - git     # version control inspection
    - ls      # directory listing
    - cat     # file content display
    - grep    # text search
    - find    # file search
    - pwd     # current directory
    - wc      # word/line count
    - head    # first N lines
    - tail    # last N lines
    - date    # current date/time
    - sed     # stream editing (non-destructive transforms)

  # forbiddenPaths: Filesystem paths the agent may NEVER access, even if
  #   allowedCommands or file_write would otherwise permit it.
  #   ZeroClaw checks both the literal path and canonicalized paths.
  #   Tilde (~) is expanded to the runtime user's home directory.
  #   These entries block accidental or intentional credential exfiltration
  #   and system file modification.
  forbiddenPaths:
    - /etc        # system configuration
    - /root       # root home directory
    - /usr        # system binaries and libraries
    - /bin        # essential command binaries
    - /sbin       # system administration binaries
    - /lib        # shared libraries
    - /opt        # optional system software
    - /boot       # bootloader and kernel files
    - /dev        # device files
    - /proc       # kernel process information (virtual fs)
    - /sys        # kernel device tree (virtual fs)
    - /var        # variable data (logs, databases, spools)
    - /tmp        # temporary files (prevent cross-user tmp attacks)
    - ~/.ssh      # SSH keys
    - ~/.gnupg    # GPG keys
    - ~/.aws      # AWS credentials
    - ~/.config   # user application configuration (may contain OAuth tokens)

  # autoApprove: Tools the agent may invoke immediately without asking the user.
  #   Each entry is a tool name as registered in ZeroClaw (snake_case).
  #   Tools NOT in this list default to requiring user approval before execution,
  #   unless the agent's autonomy.level overrides that.
  #
  #   This list is derived from DefaultAutoApproveList() in
  #   internal/zeroclaw/tools.go — it is the complete set of tools in the
  #   default tool catalog. Adjust per deployment risk tolerance.
  #
  #   Tool catalog reference (internal/zeroclaw/tools.go defaultToolCatalog):
  #
  #   Search & Web
  #     web_search_tool                  — internet search (DuckDuckGo / Brave / SearXNG)
  #     web_fetch                        — read and extract content from a URL
  #     http_request                     — make arbitrary HTTP API calls
  #
  #   Files (workspace-scoped)
  #     file_read                        — read files from the agent workspace
  #     file_write                       — create/write files in the workspace
  #     file_edit                        — edit existing files in the workspace
  #     glob_search                      — find files by name pattern
  #     content_search                   — search inside files for text/patterns
  #
  #   Memory
  #     memory_store                     — store information for future conversations
  #     memory_recall                    — retrieve previously stored context
  #     memory_forget                    — delete stored information
  #
  #   Scheduling
  #     cron_add                         — create scheduled or recurring tasks
  #     cron_list                        — list all scheduled tasks
  #     cron_remove                      — delete a scheduled task
  #     cron_update                      — modify an existing scheduled task
  #     cron_run                         — execute a scheduled task immediately
  #     cron_runs                        — view task execution history
  #
  #   Orchestrator MCP — Notifications
  #     orchestrator__send_push_notification — send push notifications to the user's device
  #
  #   Orchestrator MCP — User Context
  #     orchestrator__get_user_profile       — read the user's profile and preferences
  #     orchestrator__get_workspace_info     — get workspace details and agent list
  #     orchestrator__list_conversations     — list all conversations in the workspace
  #     orchestrator__search_past_messages   — search through past conversation history
  #
  #   Utility
  #     calculator                       — mathematical calculations
  #     weather                          — current weather for any location
  #     image_info                       — analyze and extract information from images
  #     shell                            — run allowed shell commands in the workspace
  #
  #   Default: all 26 tools above (full DefaultAutoApproveList())
  autoApprove:
    # Search & Web
    - web_search_tool
    - web_fetch
    - http_request
    # Files
    - file_read
    - file_write
    - file_edit
    - glob_search
    - content_search
    # Memory
    - memory_store
    - memory_recall
    - memory_forget
    # Scheduling
    - cron_add
    - cron_list
    - cron_remove
    - cron_update
    - cron_run
    - cron_runs
    # Orchestrator MCP — Notifications
    - orchestrator__send_push_notification
    # Orchestrator MCP — User Context
    - orchestrator__get_user_profile
    - orchestrator__get_workspace_info
    - orchestrator__list_conversations
    - orchestrator__search_past_messages
    # Utility
    - calculator
    - weather
    - image_info
    - shell

# ==============================================================================
# USERSWARM CR QUICK REFERENCE
#
# The following UserSwarm CR spec fields override values in this file on a
# per-user basis. They are applied in BuildConfigTOML() (internal/zeroclaw/toml.go)
# after this operator config is loaded.
#
#   spec.config.defaultProvider    → config.toml: default_provider
#                                    Overrides the LLM provider per user.
#                                    Example: "openai", "anthropic", "openrouter"
#
#   spec.config.defaultModel       → config.toml: default_model
#                                    Overrides the model per user.
#                                    Example: "gpt-4o", "claude-3-5-sonnet-20241022"
#
#   spec.config.defaultTemperature → config.toml: default_temperature
#                                    Overrides defaults.temperature per user.
#                                    Type: float64 pointer (omitted = use operator default)
#
#   spec.config.tomlOverrides      → raw TOML merged last, highest priority.
#                                    Escape hatch for any config.toml key not
#                                    exposed via the CR spec. Overwrites only the
#                                    keys present in the override string.
#                                    Example (multiline string in CR YAML):
#                                      tomlOverrides: |
#                                        [web_search]
#                                        provider = "brave"
#
#   spec.config.envSecretRef.name  → Name of a Kubernetes Secret whose keys are
#                                    injected as environment variables into the
#                                    ZeroClaw pod. Use for provider API keys.
#                                    The webhook checks these env vars in priority
#                                    order: OPENAI_API_KEY, USERSWARM_API_KEY,
#                                    ZEROCLAW_API_KEY, API_KEY, OPENROUTER_API_KEY,
#                                    ANTHROPIC_API_KEY, GEMINI_API_KEY
#
# Operator-managed TOML sections (keys the init container will always overwrite):
#   [root]        default_provider, default_model, default_temperature
#   [autonomy]    level, workspace_only, allowed_commands, forbidden_paths,
#                 auto_approve, always_ask
#   [http_request] enabled, allowed_domains, max_response_size, timeout_secs,
#                  allow_private_hosts
#   [web_fetch]   enabled, allowed_domains, blocked_domains, max_response_size,
#                 timeout_secs
#   [web_search]  enabled, provider, brave_api_key, searxng_instance_url,
#                 max_results, timeout_secs
#   [gateway]     port, host, allow_public_bind, require_pairing
#   [mcp]         enabled, deferred_loading, servers
#
# Any TOML key NOT in the above list is owned by ZeroClaw and is never
# overwritten by the operator merge (safe for user customisation).
# ==============================================================================

# ==============================================================================
# agents  (map[string]ZeroClawAgent)
#
# Defines delegate agents available in every ZeroClaw runtime.
# Maps to [agents.<name>] TOML sections in config.toml.
# The base agent (Manager) is defined by SOUL.md, not here.
#
# Provider and model are filled from defaults if omitted.
# skills_directory is auto-set to "agents/<name>" by BuildConfigTOML.
#
# Operator-managed: the [agents] section is fully replaced on each reconcile
# (unlike other sections which are merged key-by-key).
# ==============================================================================
agents:
  wally:
    systemPrompt: "You are Wally, a versatile assistant agent in the Crawbl swarm. You handle research, writing, analysis, and general help. Be resourceful, thorough, and friendly."
    agentic: true
    allowedTools:
      - web_search
      - web_fetch
      - file_read
      - file_write
      - memory_recall
      - memory_store
      - orchestrator__send_push_notification
      - orchestrator__get_user_profile
      - orchestrator__get_workspace_info
      - orchestrator__list_conversations
      - orchestrator__search_past_messages
