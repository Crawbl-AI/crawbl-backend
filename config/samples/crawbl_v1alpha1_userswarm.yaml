apiVersion: crawbl.ai/v1alpha1
kind: UserSwarm
metadata:
  name: demo-user
spec:
  userId: "demo-user"
  placement:
    runtimeNamespace: swarms-dev
  runtime:
    image: registry.digitalocean.com/crawbl/zeroclaw@sha256:1023b99e1dfc01710cef8ddac51f7d3c3bf7006385117c6034644891f8e3570a
    mode: daemon
    port: 42617
    imagePullSecretName: crawbl-docr
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  storage:
    size: 2Gi
    storageClassName: do-block-storage
  config:
    defaultProvider: custom:https://api.edenai.run/v3/llm
    defaultModel: "@edenai"
    # The referenced Secret should expose API_KEY for Eden AI or another provider-specific key that the bootstrap helper understands.
    envSecretRef:
      name: demo-user-provider-env
  exposure:
    httpRoute:
      enabled: false
      host: zeroclaw-dev.example.com
      path: /
      pathMatch: PathPrefix
      gatewayName: public-edge
      gatewayNamespace: envoy-gateway-system
      parentSectionName: https
