# Example UserSwarm CR — one per user, cluster-scoped.
#
# The orchestrator creates these automatically on sign-up/sign-in.
# The userswarm-operator reconciles them into StatefulSets, Services,
# ConfigMaps (config.toml, SOUL.md, IDENTITY.md), and PVCs in the
# target runtime namespace.
#
# Docs: crawbl-docs/docs/infrastructure/platform.md
apiVersion: crawbl.ai/v1alpha1
kind: UserSwarm
metadata:
  # Name is typically the user's Firebase UID (set by orchestrator).
  name: demo-user
spec:
  # Firebase UID of the owning user.
  userId: "demo-user"

  # --- Placement ---
  # Controls which namespace the runtime pods land in.
  # All user swarms share a single namespace (not namespace-per-user).
  placement:
    # Default: userswarms (matches operator constant DefaultRuntimeNamespace).
    runtimeNamespace: userswarms

  # --- Runtime ---
  # the agent runtime container configuration.
  runtime:
    # the agent runtime image — use digest pinning for reproducibility.
    # Updated via CI when crawbl-argocd-apps values change.
    image: "registry.digitalocean.com/crawbl/crawbl-agent-runtime@sha256:322ac19e3f9051a3d074906031f099944d9485aac2362bb53f0c4c30120d8ac0"
    # "daemon" keeps the pod running between requests (default).
    mode: daemon
    # Gateway port the agent runtime listens on inside the pod.
    # Must match the operator's ClusterIP Service targetPort.
    port: 42618
    # DOCR pull secret — must exist in the runtime namespace.
    imagePullSecretName: crawbl
    # Resource requests/limits for the agent runtime container.
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # --- Storage ---
  # PVC for the agent runtime workspace (conversation memory, file scratch).
  storage:
    size: 2Gi
    # Empty string uses the cluster default StorageClass (do-block-storage on DOKS).
    storageClassName: ""

  # --- Config ---
  # LLM provider and model settings baked into the bootstrap config.toml.
  config:
    # LLM provider — "openai" is the only supported provider currently.
    defaultProvider: openai
    # Default model for chat completions. gpt-5-mini is the freemium default
    # (cheaper than gpt-5, supports tool use including web_search).
    defaultModel: gpt-5-mini
    # Optional: override default temperature (0.0–2.0). Omit to use 0.7.
    # defaultTemperature: 0.7
    # Optional: raw TOML string merged into the bootstrap config.toml.
    # Use for overriding any the agent runtime setting not exposed as a first-class field.
    # tomlOverrides: ""
    # Reference to a K8s Secret containing provider API keys.
    # The Secret is mounted as envFrom on the agent runtime container.
    # Must exist in the runtime namespace (userswarms).
    envSecretRef:
      name: runtime-openai-secrets

  # --- Exposure ---
  # HTTPRoute for direct external access to this swarm (disabled by default).
  # User swarms are internal-only — the orchestrator proxies requests via
  # the ClusterIP Service. Only enable for debugging or special cases.
  exposure:
    httpRoute:
      enabled: false
      # host: agent-runtime-dev.example.com
      # path: /
      # pathMatch: PathPrefix
      # gatewayName: public-edge
      # gatewayNamespace: envoy-gateway-system
      # parentSectionName: https

  # --- Suspend ---
  # When true, the operator scales the StatefulSet to 0 replicas
  # without deleting the PVC or ConfigMap. Useful for idle users.
  # suspend: false
