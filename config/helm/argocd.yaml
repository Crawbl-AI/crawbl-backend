## ArgoCD Helm values for dev environment.
## Tuned for single-node dev cluster (s-4vcpu-8gb).

global:
  domain: ""

configs:
  params:
    server.insecure: true
    controller.status.processors: "5"
    controller.operation.processors: "3"
  cm:
    timeout.reconciliation: 60s

server:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi

controller:
  replicas: 1
  env:
    - name: GOMEMLIMIT
      value: 400MiB
  resources:
    requests:
      cpu: 10m
      memory: 256Mi
    limits:
      memory: 512Mi

repoServer:
  replicas: 1
  extraArgs:
    - --parallelismlimit=2
  resources:
    requests:
      cpu: 10m
      memory: 256Mi
    limits:
      memory: 1Gi

redis:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

applicationSet:
  enabled: false

notifications:
  enabled: false

dex:
  enabled: false
