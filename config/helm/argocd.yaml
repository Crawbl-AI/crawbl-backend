## ArgoCD Helm values for dev environment.
## Tuned for single-node dev cluster (s-4vcpu-8gb).

global:
  domain: ""

configs:
  params:
    server.insecure: true
    controller.status.processors: "5"
    controller.operation.processors: "3"
  cm:
    timeout.reconciliation: 60s

server:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi

controller:
  replicas: 1
  env:
    - name: GOMEMLIMIT
      value: 400MiB
  resources:
    requests:
      cpu: 10m
      memory: 256Mi
    limits:
      memory: 512Mi

repoServer:
  replicas: 1
  extraArgs:
    - --parallelismlimit=2
  resources:
    requests:
      cpu: 10m
      memory: 256Mi
    limits:
      memory: 1Gi
  env:
    - name: SOPS_AGE_KEYS
      valueFrom:
        secretKeyRef:
          name: sops-age-key
          key: age-key
    - name: XDG_CONFIG_HOME
      value: /.config
  volumes:
    - name: custom-tools
      emptyDir: {}
  initContainers:
    - name: install-ksops
      image: viaductoss/ksops:v4.3.2
      command: ["/bin/sh", "-c"]
      args:
        - echo "Installing KSOPS..."; mv /usr/local/bin/ksops /custom-tools/ksops; mv /usr/local/bin/kustomize /custom-tools/kustomize; echo "Done.";
      volumeMounts:
        - mountPath: /custom-tools
          name: custom-tools
  volumeMounts:
    - mountPath: /usr/local/bin/ksops
      name: custom-tools
      subPath: ksops
    - mountPath: /usr/local/bin/kustomize
      name: custom-tools
      subPath: kustomize

redis:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

applicationSet:
  enabled: false

notifications:
  enabled: false

dex:
  enabled: false
