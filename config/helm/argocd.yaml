## ArgoCD Helm values for dev environment.
## Tuned for single-node dev cluster (s-4vcpu-8gb).

global:
  domain: ""

configs:
  params:
    server.insecure: true
    controller.status.processors: "5"
    controller.operation.processors: "3"
  cm:
    timeout.reconciliation: 60s
    kustomize.buildOptions: --enable-alpha-plugins --enable-exec

server:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi

controller:
  replicas: 1
  env:
    - name: GOMEMLIMIT
      value: 400MiB
  resources:
    requests:
      cpu: 10m
      memory: 256Mi
    limits:
      memory: 512Mi

repoServer:
  replicas: 1
  extraArgs:
    - --parallelismlimit=2
  resources:
    requests:
      cpu: 10m
      memory: 256Mi
    limits:
      memory: 1Gi
  env:
    - name: SOPS_AGE_KEYS
      valueFrom:
        secretKeyRef:
          name: sops-age-key
          key: age-key
    - name: XDG_CONFIG_HOME
      value: /.config
    - name: PATH
      value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/custom-tools
  volumes:
    - name: custom-tools
      emptyDir: {}
  initContainers:
    - name: install-ksops
      image: viaductoss/ksops:v4.3.2
      command: ["/bin/sh", "-c"]
      args:
        - |
          echo "Installing KSOPS..."
          mkdir -p /custom-tools/plugin/viaduct.ai/v1/ksops
          cp /usr/local/bin/ksops /custom-tools/plugin/viaduct.ai/v1/ksops/ksops
          cp /usr/local/bin/kustomize /custom-tools/kustomize
          cp /usr/local/bin/kustomize-sops /custom-tools/kustomize-sops
          echo "Done."
      volumeMounts:
        - mountPath: /custom-tools
          name: custom-tools
    - name: install-sops
      image: ghcr.io/getsops/sops:v3.9.4-alpine
      command: ["/bin/sh", "-c"]
      args:
        - cp /usr/local/bin/sops /custom-tools/sops
      volumeMounts:
        - mountPath: /custom-tools
          name: custom-tools
  volumeMounts:
    - mountPath: /.config/kustomize/plugin
      name: custom-tools
      subPath: plugin
    - mountPath: /custom-tools
      name: custom-tools

redis:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

applicationSet:
  enabled: false

notifications:
  enabled: false

dex:
  enabled: false
