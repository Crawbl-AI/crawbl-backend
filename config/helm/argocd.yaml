## ArgoCD Helm values for dev environment.
## Minimal single-replica config. Server runs in insecure mode (TLS terminated at Gateway).

global:
  domain: ""

configs:
  params:
    server.insecure: true
  cm:
    timeout.reconciliation: 180s

server:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

controller:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

repoServer:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

redis:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 128Mi

applicationSet:
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 128Mi

notifications:
  enabled: false

dex:
  enabled: false
