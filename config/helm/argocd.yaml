## ArgoCD Helm values for dev environment.
## Ultra-minimal for single-node dev cluster (s-2vcpu-4gb).

global:
  domain: ""

configs:
  params:
    server.insecure: true
  cm:
    timeout.reconciliation: 60s

server:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi

controller:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      memory: 256Mi

repoServer:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi

redis:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

applicationSet:
  enabled: false

notifications:
  enabled: false

dex:
  enabled: false
