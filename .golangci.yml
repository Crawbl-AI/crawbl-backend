version: "2"

run:
  timeout: 5m
  modules-download-mode: vendor
  allow-parallel-runners: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: standard
  enable:
    - bodyclose
    - cyclop
    - durationcheck
    - gocognit
    - gocritic
    - gocyclo
    - intrange
    - misspell
    - mnd
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - reassign
    - rowserrcheck
    - sqlclosecheck
    - tparallel
    - unconvert
    - unparam
    - wastedassign
    - whitespace
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - noctx
          - gocognit
          - cyclop
          - mnd
    paths:
      - .cache
      - .artifacts
  settings:
    cyclop:
      # Temporarily at 70 — callAgentStreaming (66) will be split
      # during the streaming pipeline refactoring.
      max-complexity: 70
      package-average: 15
    gocognit:
      # Temporarily at 145 — callAgentStreaming (140) will be split
      # during the streaming pipeline refactoring.
      min-complexity: 145
    gocyclo:
      # Temporarily at 70 — callAgentStreaming (66) will be split
      # during the streaming pipeline refactoring.
      min-complexity: 70
    mnd:
      checks:
        - argument
        - case
        - condition
        - operation
        - return
        - assign
      ignored-numbers:
        - '0'
        - '1'
        - '2'
        - '3'
        - '4'
        - '5'
        - '10'
        - '20'
        - '60'
        - '100'
        - '500'
        - '1000'
    gocritic:
      enabled-tags:
        - performance
        - style
        - diagnostic
      disabled-checks:
        - paramTypeCombine
        - hugeParam
        - ifElseChain
        - tooManyResultsChecker
        - unnamedResult
    govet:
      enable-all: true
      disable:
        - shadow
        - fieldalignment
    staticcheck:
      checks:
        - all

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      rewrite-rules:
        - pattern: 'interface{}'
          replacement: 'any'
    goimports:
      local-prefixes:
        - github.com/Crawbl-AI/crawbl-backend
