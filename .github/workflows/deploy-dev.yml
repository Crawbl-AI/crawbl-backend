# Deploy to Dev
#
# Lightweight CI gate: validates the already-deployed dev cluster.
# Builds, deployments, and releases happen locally via `crawbl app deploy`.
name: Deploy to Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  e2e-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build crawbl CLI
        run: |
          mkdir -p .artifacts/bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -mod=vendor -trimpath -ldflags="-s -w" -buildvcs=false \
            -o .artifacts/bin/crawbl ./cmd/crawbl

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save crawbl-dev

      - name: Run E2E tests
        env:
          CRAWBL_E2E_TOKEN: ${{ secrets.CRAWBL_E2E_TOKEN }}
        run: |
          ./.artifacts/bin/crawbl test e2e \
            --base-url https://dev.api.crawbl.com \
            --e2e-token "$CRAWBL_E2E_TOKEN" \
            --timeout 30s
