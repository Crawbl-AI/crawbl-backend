# Deploy to Dev
#
# Thin wrapper around the shared deployment pipeline.
name: Deploy to Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: dev
      region: fra1
      cluster-name: crawbl-dev
      base-url: https://dev.api.crawbl.com
      registry: registry.digitalocean.com/crawbl
      push-images: true
      e2e-timeout: 15s
      rollback-on-e2e-failure: true
    secrets:
      digitalocean-token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      pulumi-access-token: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ secrets.AWS_REGION }}
      argocd-ssh-private-key: ${{ secrets.ARGOCD_SSH_PRIVATE_KEY }}
      digitalocean-vpc-id: ${{ secrets.DIGITALOCEAN_VPC_ID }}
      digitalocean-project-name: ${{ secrets.DIGITALOCEAN_PROJECT_NAME }}
      argocd-repo-token: ${{ secrets.ARGOCD_APPS_TOKEN }}
      e2e-token: ${{ secrets.CRAWBL_E2E_TOKEN }}
