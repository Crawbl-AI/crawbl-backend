name: Deploy to Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_TAG: v0.1.${{ github.run_number }}
  DOCR_REGISTRY: registry.digitalocean.com/crawbl

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build Go binary and upload as artifact
  # ---------------------------------------------------------------------------
  build-binary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Restore Go build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ hashFiles('cmd/**/*.go', 'internal/**/*.go', 'api/**/*.go') }}
          restore-keys: |
            go-build-${{ runner.os }}-

      - name: Build crawbl binary
        env:
          GOMAXPROCS: "2"
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -mod=vendor -trimpath -ldflags="-s -w" -buildvcs=false \
            -o crawbl ./cmd/crawbl

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: crawbl-binary
          path: crawbl
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Build and push Docker images in parallel (matrix strategy)
  # ---------------------------------------------------------------------------
  build-images:
    needs: [build-binary]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - component: platform
            context: .
            file: dockerfiles/platform.dockerfile
            image: crawbl-platform
          - component: auth-filter
            context: cmd/envoy-auth-filter
            file: dockerfiles/envoy-auth-filter.dockerfile
            image: envoy-auth-filter
    steps:
      - uses: actions/checkout@v4

      # Download pre-built binary for platform image.
      - name: Download binary artifact
        if: matrix.component == 'platform'
        uses: actions/download-artifact@v4
        with:
          name: crawbl-binary

      - uses: docker/setup-buildx-action@v3

      - name: Login to DOCR
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - run: doctl registry login --expiry-seconds 1200

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCR_REGISTRY }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ env.DOCR_REGISTRY }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCR_REGISTRY }}/${{ matrix.image }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true

  # ---------------------------------------------------------------------------
  # Update image tags in crawbl-argocd-apps
  # ---------------------------------------------------------------------------
  update-argocd:
    needs: [build-images]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Update ArgoCD apps with new image tags
        env:
          GH_PAT: ${{ secrets.ARGOCD_APPS_TOKEN }}
          IMAGE_TAG: v0.1.${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          git clone --depth 1 https://x-access-token:${GH_PAT}@github.com/Crawbl-AI/crawbl-argocd-apps.git /tmp/argocd-apps
          cd /tmp/argocd-apps

          echo "Updating platform image to ${IMAGE_TAG}"
          yq -i '.image.tag = strenv(IMAGE_TAG)' components/orchestrator/chart/values.yaml
          yq -i '.image.tag = strenv(IMAGE_TAG)' components/userswarm-operator/chart/values.yaml

          echo "Updating auth-filter to ${IMAGE_TAG}"
          sed -i "s|registry.digitalocean.com/crawbl/envoy-auth-filter:[^ ]*|registry.digitalocean.com/crawbl/envoy-auth-filter:${IMAGE_TAG}|g" \
            components/platform-resources/resources/envoy-extension-policy.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "deploy: update images to ${IMAGE_TAG}

          Source: crawbl-backend@${COMMIT_SHA::7}
          Workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          git push

  # ---------------------------------------------------------------------------
  # E2E tests: download pre-built binary, wait for deploy, run tests
  # ---------------------------------------------------------------------------
  e2e-test:
    needs: [update-argocd]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: crawbl-binary

      - name: Make binary executable
        run: chmod +x crawbl

      - name: Install doctl and configure kubectl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save crawbl-dev

      - name: Wait for ArgoCD sync
        env:
          EXPECTED_TAG: v0.1.${{ github.run_number }}
        run: |
          echo "Polling for image tag ${EXPECTED_TAG}..."
          for i in $(seq 1 90); do
            CURRENT=$(kubectl get deployment orchestrator -n backend \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null)
            if echo "${CURRENT}" | grep -q "${EXPECTED_TAG}"; then
              echo "ArgoCD synced: ${CURRENT}"
              kubectl rollout status deployment/orchestrator -n backend --timeout=180s
              echo "Rollout complete."
              exit 0
            fi
            echo "  attempt ${i}/90: image=${CURRENT}"
            sleep 5
          done
          echo "WARNING: Timed out waiting for ${EXPECTED_TAG}"

      - name: Run e2e tests
        env:
          CRAWBL_E2E_TOKEN: ${{ secrets.CRAWBL_E2E_TOKEN }}
        run: |
          UID_SUFFIX=$(date +%s)
          ./crawbl test e2e \
            --base-url https://dev.api.crawbl.com \
            --e2e-token "${CRAWBL_E2E_TOKEN}" \
            --uid "ci-e2e-${UID_SUFFIX}" \
            --email "ci-e2e-${UID_SUFFIX}@crawbl.test" \
            --timeout 15s \
            -v
