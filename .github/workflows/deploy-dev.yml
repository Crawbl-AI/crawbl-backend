# Deploy to Dev
#
# Lightweight CI gate: validates the already-deployed dev cluster and creates
# releases. Builds and deployments happen locally via `crawbl app deploy`.
name: Deploy to Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  e2e-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build crawbl CLI
        run: |
          mkdir -p .artifacts/bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -mod=vendor -trimpath -ldflags="-s -w" -buildvcs=false \
            -o .artifacts/bin/crawbl ./cmd/crawbl

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save crawbl-dev

      - name: Run E2E tests
        env:
          CRAWBL_E2E_TOKEN: ${{ secrets.CRAWBL_E2E_TOKEN }}
        run: |
          ./.artifacts/bin/crawbl test e2e \
            --base-url https://dev.api.crawbl.com \
            --e2e-token "$CRAWBL_E2E_TOKEN" \
            --timeout 30s

  release:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semver tag
        id: semver
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"

          BUMP="patch"
          while IFS= read -r line; do
            if echo "$line" | grep -qE '^[a-z]+(\(.+\))?!:'; then
              BUMP="major"
              break
            elif echo "$line" | grep -qE '^feat(\(.+\))?:'; then
              if [ "$BUMP" != "major" ]; then
                BUMP="minor"
              fi
            fi
          done < <(git log "${LAST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null)

          IFS='.' read -r major minor patch <<< "${LAST_TAG#v}"
          case "$BUMP" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          TAG="v${major}.${minor}.${patch}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Calculated tag: $TAG (bump: $BUMP)"

      - name: Create Git tag and GitHub release
        env:
          TAG: ${{ steps.semver.outputs.tag }}
        run: |
          if ! git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" "$GITHUB_SHA" -m "Release $TAG"
            git push origin "refs/tags/$TAG"
          else
            echo "Tag $TAG already exists. Skipping tag creation."
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping release creation."
            exit 0
          fi

          gh release create "$TAG" \
            --verify-tag \
            --title "Release $TAG" \
            --generate-notes
