name: Deploy to Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_TAG: v0.1.${{ github.run_number }}
  DOCR_REGISTRY: registry.digitalocean.com/crawbl

jobs:
  # ---------------------------------------------------------------------------
  # Build and push the unified platform image (orchestrator + operator + tools)
  # ---------------------------------------------------------------------------
  build-platform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - run: doctl registry login --expiry-seconds 1200
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/platform.dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCR_REGISTRY }}/crawbl-platform:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=platform
          cache-to: type=gha,mode=max,scope=platform

  # ---------------------------------------------------------------------------
  # Build and push envoy auth filter WASM image
  # ---------------------------------------------------------------------------
  build-auth-filter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - run: doctl registry login --expiry-seconds 1200
      - uses: docker/build-push-action@v6
        with:
          context: cmd/envoy-auth-filter
          file: dockerfiles/envoy-auth-filter.dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCR_REGISTRY }}/envoy-auth-filter:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=auth-filter
          cache-to: type=gha,mode=max,scope=auth-filter

  # ---------------------------------------------------------------------------
  # Update image tags in crawbl-argocd-apps so ArgoCD syncs the new images
  # ---------------------------------------------------------------------------
  update-argocd:
    needs: [build-platform, build-auth-filter]
    runs-on: ubuntu-latest
    steps:
      - name: Update ArgoCD apps with new image tags
        env:
          GH_PAT: ${{ secrets.ARGOCD_APPS_TOKEN }}
          IMAGE_TAG: v0.1.${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          git clone --depth 1 https://x-access-token:${GH_PAT}@github.com/Crawbl-AI/crawbl-argocd-apps.git /tmp/argocd-apps
          cd /tmp/argocd-apps

          echo "Updating platform image to ${IMAGE_TAG}"
          yq -i '.image.tag = strenv(IMAGE_TAG)' components/orchestrator/chart/values.yaml
          yq -i '.image.tag = strenv(IMAGE_TAG)' components/userswarm-operator/chart/values.yaml

          echo "Updating auth-filter to ${IMAGE_TAG}"
          sed -i "s|registry.digitalocean.com/crawbl/envoy-auth-filter:[^ ]*|registry.digitalocean.com/crawbl/envoy-auth-filter:${IMAGE_TAG}|g" \
            components/platform-resources/resources/envoy-extension-policy.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "deploy: update images to ${IMAGE_TAG}

          Source: crawbl-backend@${COMMIT_SHA::7}
          Workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          git push

  # ---------------------------------------------------------------------------
  # E2E tests: build binary + wait for deploy in parallel, then run tests
  # ---------------------------------------------------------------------------
  e2e-test:
    needs: [update-argocd]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install doctl and configure kubectl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save crawbl-dev

      - name: Build e2e binary and wait for ArgoCD sync
        env:
          EXPECTED_TAG: v0.1.${{ github.run_number }}
        run: |
          # Build the crawbl binary in the background while waiting for ArgoCD.
          go build -mod=vendor -o /tmp/crawbl ./cmd/crawbl &
          BUILD_PID=$!

          # Poll immediately — no sleep. ArgoCD polls every 3 min by default,
          # and the build step above takes ~30s which overlaps with the wait.
          echo "Polling for image tag ${EXPECTED_TAG} in orchestrator deployment..."
          for i in $(seq 1 90); do
            CURRENT=$(kubectl get deployment orchestrator -n backend \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null)
            if echo "${CURRENT}" | grep -q "${EXPECTED_TAG}"; then
              echo "ArgoCD synced: ${CURRENT}"
              kubectl rollout status deployment/orchestrator -n backend --timeout=180s
              echo "Rollout complete."
              break
            fi
            echo "  attempt ${i}/90: image=${CURRENT}"
            sleep 5
          done

          # Wait for the Go build to finish.
          wait $BUILD_PID
          echo "Binary built."

      - name: Run e2e tests
        env:
          CRAWBL_E2E_TOKEN: ${{ secrets.CRAWBL_E2E_TOKEN }}
        run: |
          UID_SUFFIX=$(date +%s)
          /tmp/crawbl test e2e \
            --base-url https://dev.api.crawbl.com \
            --e2e-token "${CRAWBL_E2E_TOKEN}" \
            --uid "ci-e2e-${UID_SUFFIX}" \
            --email "ci-e2e-${UID_SUFFIX}@crawbl.test" \
            --timeout 15s \
            -v
