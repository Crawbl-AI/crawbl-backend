# Deploy to Dev
#
# Full pipeline: compile Go binary → build Docker images → update ArgoCD manifests → E2E tests
#
# Trigger: every push to main, or manual workflow_dispatch.
#
# Flow:
#   1. build       — Compile the Go binary on Blacksmith, upload as artifact,
#                    then build and push Docker images to DOCR (binary is COPYd in, not compiled in Docker).
#   2. update-argocd — Clone crawbl-argocd-apps, patch image tags with yq/sed, push.
#                      ArgoCD picks up the tag change and rolls out the new images.
#   3. e2e-test    — Download the pre-built binary artifact (no recompilation), wait for
#                    ArgoCD to sync the new image to the cluster, then run the E2E suite.
#
# History: pipeline went from 22 min → ~6 min.
# Key wins: prebuilt binary (Docker no longer compiles Go), Blacksmith 16 vCPU,
# artifact sharing between build and e2e jobs, and NVMe Docker layer caching.
name: Deploy to Dev

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_TAG: v0.1.${{ github.run_number }}
  DOCR_REGISTRY: registry.digitalocean.com/crawbl

# Fixed group name "deploy-dev" means all runs (push AND workflow_dispatch) share one queue.
# cancel-in-progress: false means queued runs wait instead of being cancelled — important on
# main where we never want to skip a deploy silently.
#
# Previous approach used `group: ${{ github.ref }}`, which created separate concurrency
# groups for push and workflow_dispatch events on the same branch. That caused a
# workflow_dispatch run to cancel an in-progress push run (or vice versa), producing
# unexpected skipped deploys.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Build Go binary and Docker images on Blacksmith (16 vCPU)
  #
  # Blacksmith runners have NVMe-backed storage and significantly more CPU than
  # GitHub-hosted runners. 16 vCPU dropped Go compilation from ~11 min to ~2-3 min.
  # ---------------------------------------------------------------------------
  build:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # cache: false — setup-go's built-in cache keys on go.sum, which is useless when
      # using vendored dependencies (go.sum doesn't change on source edits) and for
      # cross-compilation targets. We manage the build cache explicitly below.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      # Explicit Go build cache keyed on actual source file hashes (cmd/, internal/, api/).
      # This means a cache hit when source hasn't changed, and a proper miss when it has —
      # unlike go.sum-keyed caches that never invalidate on source edits.
      - name: Restore Go build cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: go-build-${{ runner.os }}-${{ hashFiles('cmd/**/*.go', 'internal/**/*.go', 'api/**/*.go') }}
          restore-keys: |
            go-build-${{ runner.os }}-

      # GOMAXPROCS=16 — explicitly use all 16 Blacksmith vCPUs for parallel compilation.
      # CGO_ENABLED=0 + GOOS/GOARCH — static cross-compile for the linux/amd64 container target.
      # -mod=vendor — use the vendor/ directory; no network access needed.
      # -trimpath — strip local build paths from the binary for reproducibility.
      # -ldflags="-s -w" — strip symbol table and DWARF debug info to reduce binary size.
      # -buildvcs=false — skip embedding git metadata (commit hash, dirty flag) into the binary.
      #                   Saves a noticeable amount of overhead on every build.
      - name: Build crawbl binary
        env:
          GOMAXPROCS: "16"
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -mod=vendor -trimpath -ldflags="-s -w" -buildvcs=false \
            -o crawbl ./cmd/crawbl

      # Upload the compiled binary so the e2e-test job can download and reuse it.
      # retention-days: 1 — artifact only needs to last for the duration of this pipeline run.
      # This avoids recompiling Go in the e2e job and keeps the e2e runner small (2 vCPU).
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: crawbl-binary
          path: crawbl
          retention-days: 1

      # Blacksmith's Docker builder uses NVMe-backed layer caching, making layer
      # pushes and pulls significantly faster than the default Docker BuildKit cache.
      - uses: useblacksmith/setup-docker-builder@v1

      - name: Login to DOCR
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - run: doctl registry login --expiry-seconds 1200

      # platform.dockerfile is the CI Dockerfile — it expects the binary to already exist
      # at ./crawbl and simply COPYs it into a distroless base image. This takes ~5 seconds.
      # (platform-full.dockerfile is for local builds where Docker compiles Go itself.)
      - name: Build and push platform image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: dockerfiles/platform.dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCR_REGISTRY }}/crawbl-platform:${{ env.IMAGE_TAG }}

      - name: Build and push auth filter
        uses: useblacksmith/build-push-action@v2
        with:
          context: cmd/envoy-auth-filter
          file: dockerfiles/envoy-auth-filter.dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCR_REGISTRY }}/envoy-auth-filter:${{ env.IMAGE_TAG }}

  # ---------------------------------------------------------------------------
  # Update image tags in crawbl-argocd-apps
  #
  # Clones the crawbl-argocd-apps repo, patches the image tags in Helm values
  # and raw manifests, then pushes. ArgoCD watches this repo and auto-syncs the
  # new tags to the cluster. A 2 vCPU runner is sufficient — this is just git + yq/sed.
  # ---------------------------------------------------------------------------
  update-argocd:
    needs: [build]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 2
    steps:
      - name: Update ArgoCD apps with new image tags
        env:
          GH_PAT: ${{ secrets.ARGOCD_APPS_TOKEN }}
          IMAGE_TAG: v0.1.${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          git clone --depth 1 https://x-access-token:${GH_PAT}@github.com/Crawbl-AI/crawbl-argocd-apps.git /tmp/argocd-apps
          cd /tmp/argocd-apps

          echo "Updating orchestrator image to ${IMAGE_TAG}"
          yq -i '.image.tag = strenv(IMAGE_TAG)' components/orchestrator/chart/values.yaml

          echo "Updating auth-filter to ${IMAGE_TAG}"
          sed -i "s|registry.digitalocean.com/crawbl/envoy-auth-filter:[^ ]*|registry.digitalocean.com/crawbl/envoy-auth-filter:${IMAGE_TAG}|g" \
            components/envoy-gateway/resources/envoy-extension-policy.yaml

          echo "Updating webhook + reaper images to ${IMAGE_TAG}"
          sed -i "s|registry.digitalocean.com/crawbl/crawbl-platform:[^ ]*|registry.digitalocean.com/crawbl/crawbl-platform:${IMAGE_TAG}|g" \
            components/metacontroller/resources/userswarm-webhook.yaml \
            components/metacontroller/resources/e2e-reaper-cronjob.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Exit cleanly with no commit if nothing changed (e.g. workflow re-run with same run_number).
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "deploy: update images to ${IMAGE_TAG}

          Source: crawbl-backend@${COMMIT_SHA::7}
          Workflow: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          git push

  # ---------------------------------------------------------------------------
  # Infrastructure drift check: verify Pulumi state matches actual infra.
  # Runs "crawbl infra plan" and fails if there are unexpected changes.
  # This catches manual changes, missing resources, or config drift early.
  # Runs in parallel with e2e-test since they're independent.
  # ---------------------------------------------------------------------------
  infra-drift-check:
    needs: [build]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: crawbl-binary

      - name: Make binary executable
        run: chmod +x crawbl

      - name: Check for infrastructure drift
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          OUTPUT=$(./crawbl infra plan 2>&1)
          echo "$OUTPUT"

          # The plan summary line looks like: "+ N to create  ~ N to update  - N to delete  = N unchanged"
          # If there are only unchanged resources, there's no drift.
          if echo "$OUTPUT" | grep -qE '\+ [1-9]|~ [1-9]|- [1-9]'; then
            echo "::warning::Infrastructure drift detected — review the plan output above"
          else
            echo "No infrastructure drift detected."
          fi

  # ---------------------------------------------------------------------------
  # E2E tests: download pre-built binary, wait for deploy, run tests
  #
  # Downloads the binary compiled in the build job — no Go toolchain needed here.
  # Configures kubectl via doctl, then polls the cluster until ArgoCD has rolled
  # out the new image tag. Once the deployment is live, runs the E2E suite through
  # the pre-built crawbl binary.
  # ---------------------------------------------------------------------------
  e2e-test:
    needs: [update-argocd]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # Reuse the binary built in the build job. Avoids installing Go and recompiling
      # on this smaller runner. The artifact was uploaded with retention-days: 1.
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: crawbl-binary

      - name: Make binary executable
        run: chmod +x crawbl

      - name: Install doctl and configure kubectl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save kubeconfig
        run: doctl kubernetes cluster kubeconfig save crawbl-dev

      # Poll kubectl every 5 seconds (up to 90 attempts = 7.5 min) for the orchestrator
      # deployment to show the expected image tag. This detects when ArgoCD has applied
      # the manifest change from the update-argocd job and Kubernetes has started the
      # new pod. Once the tag is visible, wait for a clean rollout before proceeding.
      - name: Wait for ArgoCD sync
        env:
          EXPECTED_TAG: v0.1.${{ github.run_number }}
        run: |
          echo "Polling for image tag ${EXPECTED_TAG}..."
          for i in $(seq 1 90); do
            CURRENT=$(kubectl get deployment orchestrator -n backend \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null)
            if echo "${CURRENT}" | grep -q "${EXPECTED_TAG}"; then
              echo "ArgoCD synced: ${CURRENT}"
              kubectl rollout status deployment/orchestrator -n backend --timeout=180s
              echo "Rollout complete."
              exit 0
            fi
            echo "  attempt ${i}/90: image=${CURRENT}"
            sleep 5
          done
          echo "WARNING: Timed out waiting for ${EXPECTED_TAG}"

      # Run the E2E suite via the pre-built crawbl binary.
      # Uses exec so the Go binary receives SIGINT directly from GitHub Actions
      # on cancellation, allowing graceful cleanup of test users.
      #
      # --e2e-token: passed as the X-E2E-Token header. The gateway has a dedicated
      #   HTTPRoute that bypasses Envoy's SecurityPolicy JWT validation for requests
      #   carrying this token, so CI can authenticate without needing a real Firebase JWT.
      #
      # --uid / --email with a timestamp suffix: generates a unique test user per run
      #   so concurrent or back-to-back runs do not collide on the same user record.
      #
      # --timeout 15s: per-request timeout for individual test steps.
      - name: Run e2e tests
        env:
          CRAWBL_E2E_TOKEN: ${{ secrets.CRAWBL_E2E_TOKEN }}
        run: |
          UID_SUFFIX=$(date +%s)
          exec ./crawbl test e2e \
            --base-url https://dev.api.crawbl.com \
            --e2e-token "${CRAWBL_E2E_TOKEN}" \
            --uid "ci-e2e-${UID_SUFFIX}" \
            --email "ci-e2e-${UID_SUFFIX}@crawbl.test" \
            --timeout 15s \
            -v
