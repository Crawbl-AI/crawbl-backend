# Deploy to Production
#
# Manual-trigger workflow that builds images, checks infra drift, updates
# ArgoCD image tags, and optionally runs E2E validation against prod.
#
# The workflow uses the same reusable pipeline as dev but with prod defaults.
# All 3 orchestrator components (api/mcp/worker) share the same platform
# image — updating image.tag in values.yaml rolls all of them.
name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Pulumi environment'
        required: true
        default: 'prod'
        type: string
      region:
        description: 'Cloud region'
        required: true
        default: 'fra1'
        type: string
      cluster-name:
        description: 'Kubernetes cluster name'
        required: true
        default: 'crawbl-prod'
        type: string
      base-url:
        description: 'Production API base URL for E2E tests'
        required: true
        default: 'https://api.crawbl.com'
        type: string
      skip-e2e:
        description: 'Skip E2E tests (use for hotfixes only)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: ${{ inputs.environment }}
      region: ${{ inputs.region }}
      cluster-name: ${{ inputs.cluster-name }}
      base-url: ${{ inputs.base-url }}
      registry: registry.digitalocean.com/crawbl
      push-images: true
      e2e-timeout: 60s
      rollback-on-e2e-failure: true
    secrets:
      digitalocean-token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      pulumi-access-token: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ secrets.AWS_REGION }}
      argocd-ssh-private-key: ${{ secrets.ARGOCD_SSH_PRIVATE_KEY }}
      digitalocean-vpc-id: ${{ secrets.DIGITALOCEAN_VPC_ID }}
      digitalocean-project-name: ${{ secrets.DIGITALOCEAN_PROJECT_NAME }}
      argocd-repo-token: ${{ secrets.ARGOCD_APPS_TOKEN }}
      e2e-token: ${{ secrets.CRAWBL_E2E_TOKEN }}
