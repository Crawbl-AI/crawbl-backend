# Reusable Rollback ArgoCD Workflow
#
# Rollback crawbl-argocd-apps to previous image tags.
#
# Usage:
#   jobs:
#     rollback-argocd:
#       uses: ./workflows/reusable-rollback-argocd.yml
#       if: always() && needs.e2e-test.result == 'failure'
#       with:
#         prev-orchestrator-tag: v0.1.5
#         prev-auth-filter-tag: v0.1.5
#         prev-platform-tag: v0.1.5
#         failed-tag: v0.2.0
#       secrets:
#         argocd-repo-token: ${{ secrets.ARGOCD_APPS_TOKEN }}
name: Reusable Rollback ArgoCD

on:
  workflow_call:
    inputs:
      prev-orchestrator-tag:
        description: 'Previous orchestrator tag to restore'
        required: true
        type: string
      prev-auth-filter-tag:
        description: 'Previous auth-filter tag to restore'
        required: true
        type: string
      prev-platform-tag:
        description: 'Previous platform tag to restore'
        required: true
        type: string
      failed-tag:
        description: 'Failed tag that triggered rollback'
        required: true
        type: string
    secrets:
      argocd-repo-token:
        required: true

jobs:
  rollback-argocd:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Rollback ArgoCD to previous image tags
        env:
          GH_PAT: ${{ secrets.argocd-repo-token }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "Rolling back from ${{ inputs.failed-tag }} to previous tags:"
          echo "  orchestrator: ${{ inputs.prev-orchestrator-tag }}"
          echo "  auth-filter:  ${{ inputs.prev-auth-filter-tag }}"
          echo "  platform:     ${{ inputs.prev-platform-tag }}"

          git clone --depth 1 "https://x-access-token:${GH_PAT}@github.com/Crawbl-AI/crawbl-argocd-apps.git" /tmp/argocd-apps
          cd /tmp/argocd-apps

          export IMAGE_TAG="${{ inputs.prev-orchestrator-tag }}"
          yq -i '.image.tag = strenv(IMAGE_TAG)' components/orchestrator/chart/values.yaml

          sed -i "s|registry.digitalocean.com/crawbl/envoy-auth-filter:[^ ]*|registry.digitalocean.com/crawbl/envoy-auth-filter:${{ inputs.prev-auth-filter-tag }}|g" \
            components/envoy-gateway/resources/envoy-extension-policy.yaml

          sed -i "s|registry.digitalocean.com/crawbl/crawbl-platform:[^ ]*|registry.digitalocean.com/crawbl/crawbl-platform:${{ inputs.prev-platform-tag }}|g" \
            components/metacontroller/resources/userswarm-webhook.yaml \
            components/metacontroller/resources/e2e-reaper-cronjob.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to rollback" && exit 0
          git commit -m "rollback: revert images from ${{ inputs.failed-tag }} to ${{ inputs.prev-orchestrator-tag }} (e2e failed)

          Source: crawbl-backend@${COMMIT_SHA::7}
          Failed run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          git push
