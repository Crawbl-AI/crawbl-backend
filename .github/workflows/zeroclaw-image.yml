name: Build ZeroClaw Image

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Upstream ZeroClaw git tag or ref
        required: true
        default: v0.5.9
      image_tag:
        description: Target image tag in DOCR
        required: true
        default: v0.5.9
      docker_target:
        description: Dockerfile target to build
        required: true
        default: release
      platform:
        description: Target image platform
        required: true
        default: linux/amd64

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ZEROCLAW_IMAGE_TAG: ${{ inputs.image_tag }}
      ZEROCLAW_GIT_REF: ${{ inputs.git_ref }}
      ZEROCLAW_DOCKER_TARGET: ${{ inputs.docker_target }}
      ZEROCLAW_PLATFORM: ${{ inputs.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 1200

      - name: Build crawbl CLI
        run: go build -o crawbl ./cmd/crawbl

      - name: Build and push ZeroClaw image
        run: |
          ./crawbl app build zeroclaw \
            --tag "$ZEROCLAW_IMAGE_TAG" \
            --ref "$ZEROCLAW_GIT_REF" \
            --target "$ZEROCLAW_DOCKER_TARGET" \
            --platform "$ZEROCLAW_PLATFORM" \
            --push
