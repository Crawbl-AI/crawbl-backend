# Reusable E2E Test Workflow
#
# Run E2E tests against the deployed cluster.
#
# Usage:
#   jobs:
#     e2e-test:
#       uses: ./workflows/reusable-e2e-test.yml
#       needs: [update-argocd]
#       with:
#         image-tag: v0.2.0
#         base-url: https://api-dev.crawbl.com
#         cluster-name: crawbl-dev
#         cluster-type: doks   # or k3s
#       secrets:
#         digitalocean-token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
#         e2e-token: ${{ secrets.CRAWBL_E2E_TOKEN }}
#         kubeconfig: ${{ secrets.CRAWBL_DEV_KUBECONFIG }}   # required when cluster-type=k3s
name: Reusable E2E Test

on:
  workflow_call:
    inputs:
      image-tag:
        description: 'Expected image tag to wait for'
        required: true
        type: string
      base-url:
        description: 'Base URL for the API'
        required: false
        default: 'https://api-dev.crawbl.com'
        type: string
      cluster-name:
        description: 'Kubernetes cluster name (used when cluster-type=doks)'
        required: false
        default: 'crawbl-dev'
        type: string
      cluster-type:
        description: 'Cluster provider: doks or k3s'
        required: false
        default: 'doks'
        type: string
      test-uid-suffix:
        description: 'Suffix for test user ID (for uniqueness)'
        required: false
        default: ''
        type: string
      timeout:
        description: 'Per-request timeout passed to the E2E CLI'
        required: false
        default: '30s'
        type: string
    secrets:
      digitalocean-token:
        required: false
      e2e-token:
        required: true
      kubeconfig:
        required: false

jobs:
  e2e-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: crawbl-binary

      - name: Make binary executable
        run: chmod +x crawbl

      - name: Install doctl and configure kubectl
        if: inputs.cluster-type == 'doks'
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.digitalocean-token }}

      - name: Save kubeconfig (doks)
        if: inputs.cluster-type == 'doks'
        env:
          CLUSTER_NAME: ${{ inputs.cluster-name }}
        run: doctl kubernetes cluster kubeconfig save "${CLUSTER_NAME}"

      - name: Write kubeconfig (k3s)
        if: inputs.cluster-type == 'k3s'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.kubeconfig }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Wait for ArgoCD sync
        env:
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          echo "Polling for image tag ${IMAGE_TAG}..."
          for i in $(seq 1 90); do
            CURRENT=$(kubectl get deployment orchestrator -n backend \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null)
            if echo "${CURRENT}" | grep -q "${IMAGE_TAG}"; then
              echo "ArgoCD synced: ${CURRENT}"
              kubectl rollout status deployment/orchestrator -n backend --timeout=180s
              echo "Rollout complete."
              exit 0
            fi
            echo "  attempt ${i}/90: image=${CURRENT}"
            sleep 5
          done
          echo "WARNING: Timed out waiting for ${IMAGE_TAG}"
          exit 1

      - name: Run e2e tests
        env:
          CRAWBL_E2E_TOKEN: ${{ secrets.e2e-token }}
          UID_SUFFIX: ${{ inputs.test-uid-suffix != '' && inputs.test-uid-suffix || format('ci-{0}', github.run_id) }}
          E2E_BASE_URL: ${{ inputs.base-url }}
          E2E_TIMEOUT: ${{ inputs.timeout }}
        run: |
          exec ./crawbl test e2e \
            --base-url "${E2E_BASE_URL}" \
            --e2e-token "${CRAWBL_E2E_TOKEN}" \
            --uid "ci-e2e-${UID_SUFFIX}" \
            --email "ci-e2e-${UID_SUFFIX}@crawbl.test" \
            --timeout "${E2E_TIMEOUT}" \
            -v
