name: ZeroClaw Upstream Sync

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Monday at 9:00 UTC
  workflow_dispatch:       # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout crawbl-zeroclaw
        uses: actions/checkout@v4
        with:
          repository: Crawbl-AI/crawbl-zeroclaw
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/zeroclaw-labs/zeroclaw.git

      - name: Fetch upstream
        run: git fetch upstream master

      - name: Check for new upstream commits
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/master)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "No new upstream commits"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            UPSTREAM_SHORT=$(git rev-parse --short upstream/master)
            echo "New upstream commits detected"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "upstream_sha=$UPSTREAM_SHORT" >> "$GITHUB_OUTPUT"
          fi

      - name: Create sync branch and merge
        if: steps.check.outputs.has_changes == 'true'
        id: merge
        env:
          UPSTREAM_SHA: ${{ steps.check.outputs.upstream_sha }}
        run: |
          BRANCH="upstream-sync/${UPSTREAM_SHA}"
          git checkout -b "$BRANCH"
          if git merge upstream/master --no-edit; then
            echo "merge_clean=true" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "merge_clean=false" >> "$GITHUB_OUTPUT"
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Push and create PR (clean merge)
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.merge_clean == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          BRANCH: ${{ steps.merge.outputs.branch }}
          UPSTREAM_SHA: ${{ steps.check.outputs.upstream_sha }}
        run: |
          git push origin "$BRANCH"
          gh pr create \
            --repo Crawbl-AI/crawbl-zeroclaw \
            --title "Upstream sync: ${UPSTREAM_SHA}" \
            --body "Merges latest upstream master. Clean merge, no conflicts. Review and merge when ready." \
            --base main-crawbl \
            --head "$BRANCH"

      - name: Push and create PR (conflicts)
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.merge_clean == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          BRANCH: ${{ steps.merge.outputs.branch }}
          UPSTREAM_SHA: ${{ steps.check.outputs.upstream_sha }}
        run: |
          git checkout -B "$BRANCH" upstream/master
          git push origin "$BRANCH"
          gh pr create \
            --repo Crawbl-AI/crawbl-zeroclaw \
            --title "Upstream sync (CONFLICTS): ${UPSTREAM_SHA}" \
            --body "Upstream has changes that conflict with Crawbl extensions. Manual resolution required." \
            --base main-crawbl \
            --head "$BRANCH" \
            --label "upstream-sync"
