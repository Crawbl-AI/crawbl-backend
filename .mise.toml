# Tool versions for crawbl-backend.
# Install all: `mise install`
# Docs: https://mise.jdx.dev/

[tools]
go = "1.25.8"
kubectl = "1.32.13"
helm = "3.7"
doctl = "1.152"
awscli = "2.34.19"
pulumi = "3.228"
yq = "4"
# ko builds container images for Go binaries (platform, agent-runtime).
# Auth-filter still uses Docker (TinyGo/WASM).
ko = "0.18"
# protoc is used for generating gRPC + Protobuf bindings for the crawbl-agent-runtime
# in internal/agentruntime and proto/agentruntime/v1/*.proto. The Go plugins
# (protoc-gen-go, protoc-gen-go-grpc) are installed via `crawbl generate --install-tools`
protoc = "34.1"
# Snyk CLI for security scanning and MCP integration with Claude Code.
"npm:snyk" = "latest"
