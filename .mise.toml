# Tool versions for crawbl-backend.
# Install all: `mise install`
# Docs: https://mise.jdx.dev/

[tools]
go = "1.25.8"
kubectl = "1.32.13"
helm = "3.7"
doctl = "1.152"
awscli = "2.34.19"
pulumi = "3.228"
yq = "4"
# ko builds container images for Go binaries (platform, agent-runtime).
# Auth-filter still uses Docker (TinyGo/WASM).
ko = "0.18"
# buf is the primary protobuf build tool. It replaces raw protoc invocations
# for linting, breaking-change detection, and code generation (buf generate).
buf = "1.50"
# protoc is kept as a fallback dependency for buf remote plugins.
protoc = "34.1"
# SonarQube scanner CLI for static analysis (Go code quality).
sonar-scanner-cli = "latest"
# gosec — Go security scanner (OWASP vulnerabilities, hardcoded secrets, weak crypto).
# Outputs SonarQube-compatible reports imported as external issues.
"go:github.com/securego/gosec/v2/cmd/gosec" = "latest"
# Snyk CLI for security scanning and MCP integration with Claude Code.
"npm:snyk" = "latest"
