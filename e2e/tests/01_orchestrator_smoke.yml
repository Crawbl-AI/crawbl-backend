name: "Orchestrator auth and workspace flow"

testcases:
- name: health
  steps:
  - type: http
    method: GET
    url: http://127.0.0.1:7171/v1/health
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.data.online ShouldEqual true
    - result.bodyjson.data.version ShouldEqual dev

- name: public_legal
  steps:
  - type: http
    method: GET
    url: http://127.0.0.1:7171/v1/legal
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.data.termsOfService ShouldEqual https://crawbl.com/terms
    - result.bodyjson.data.privacyPolicy ShouldEqual https://crawbl.com/privacy
    - result.bodyjson.data.termsOfServiceVersion ShouldEqual v1
    - result.bodyjson.data.privacyPolicyVersion ShouldEqual v1

- name: sign_up
  steps:
  - type: http
    method: POST
    url: http://127.0.0.1:7171/v1/auth/sign-up
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
    assertions:
    - result.statuscode ShouldEqual 204

- name: sign_in
  steps:
  - type: http
    method: POST
    url: http://127.0.0.1:7171/v1/auth/sign-in
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
    assertions:
    - result.statuscode ShouldEqual 204

- name: profile_defaults
  steps:
  - type: http
    method: GET
    url: http://127.0.0.1:7171/v1/users/profile
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.data.email ShouldEqual test@example.com
    - result.bodyjson.data.firebaseUid ShouldEqual test-user
    - result.bodyjson.data.name ShouldEqual "Test User"
    - result.bodyjson.data.nickname ShouldEqual ""
    - result.bodyjson.data.isDeleted ShouldEqual false
    - result.bodyjson.data.isBanned ShouldEqual false
    - result.bodyjson.data.hasAgreedWithTerms ShouldEqual false
    - result.bodyjson.data.hasAgreedWithPrivacyPolicy ShouldEqual false
    - result.bodyjson.data.subscription.name ShouldEqual Freemium
    - result.bodyjson.data.subscription.code ShouldEqual freemium

- name: update_profile
  steps:
  - type: http
    method: PATCH
    url: http://127.0.0.1:7171/v1/users
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
      Content-Type: application/json
    body: |
      {
        "nickname": "bezhan",
        "name": "Bezhan",
        "surname": "H",
        "countryCode": "CY",
        "dateOfBirth": "2000-01-15T00:00:00Z",
        "preferences": {
          "platformTheme": "dark",
          "platformLanguage": "en",
          "currencyCode": "EUR"
        }
      }
    assertions:
    - result.statuscode ShouldEqual 204

- name: profile_updated
  steps:
  - type: http
    method: GET
    url: http://127.0.0.1:7171/v1/users/profile
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.data.nickname ShouldEqual bezhan
    - result.bodyjson.data.name ShouldEqual Bezhan
    - result.bodyjson.data.surname ShouldEqual H
    - result.bodyjson.data.countryCode ShouldEqual CY
    - result.bodyjson.data.preferences.platformTheme ShouldEqual dark
    - result.bodyjson.data.preferences.platformLanguage ShouldEqual en
    - result.bodyjson.data.preferences.currencyCode ShouldEqual EUR

- name: user_legal_before_accept
  steps:
  - type: http
    method: GET
    url: http://127.0.0.1:7171/v1/users/legal
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.data.hasAgreedWithTerms ShouldEqual false
    - result.bodyjson.data.hasAgreedWithPrivacyPolicy ShouldEqual false
    - result.bodyjson.data.termsOfServiceVersion ShouldEqual v1
    - result.bodyjson.data.privacyPolicyVersion ShouldEqual v1

- name: accept_terms
  steps:
  - type: http
    method: POST
    url: http://127.0.0.1:7171/v1/users/legal/accept
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
      Content-Type: application/json
    body: |
      {
        "termsOfServiceVersion": "v1"
      }
    assertions:
    - result.statuscode ShouldEqual 204

- name: accept_privacy
  steps:
  - type: http
    method: POST
    url: http://127.0.0.1:7171/v1/users/legal/accept
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
      Content-Type: application/json
    body: |
      {
        "privacyPolicyVersion": "v1"
      }
    assertions:
    - result.statuscode ShouldEqual 204

- name: user_legal_after_accept
  steps:
  - type: http
    method: GET
    url: http://127.0.0.1:7171/v1/users/legal
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.data.hasAgreedWithTerms ShouldEqual true
    - result.bodyjson.data.hasAgreedWithPrivacyPolicy ShouldEqual true

- name: push_token
  steps:
  - type: http
    method: POST
    url: http://127.0.0.1:7171/v1/fcm-token
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
      Content-Type: application/json
    body: |
      {
        "pushToken": "test-push-token"
      }
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.success ShouldEqual true

- name: workspaces
  steps:
  - type: http
    method: GET
    url: http://127.0.0.1:7171/v1/workspaces
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
    vars:
      workspace_id:
        from: result.bodyjson.data.data0.id
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.data.data0.name ShouldEqual My Swarm
    - result.bodyjson.data.data0.runtime.status ShouldEqual ready
    - result.bodyjson.data.data0.runtime.phase ShouldEqual Ready
    - result.bodyjson.data.data0.runtime.verified ShouldEqual true

- name: workspace_get
  steps:
  - type: http
    method: GET
    url: http://127.0.0.1:7171/v1/workspaces/{{.workspaces.workspace_id}}
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.data.name ShouldEqual My Swarm
    - result.bodyjson.data.runtime.status ShouldEqual ready
    - result.bodyjson.data.runtime.phase ShouldEqual Ready
    - result.bodyjson.data.runtime.verified ShouldEqual true

- name: agents_list
  steps:
  - type: http
    method: GET
    url: http://127.0.0.1:7171/v1/workspaces/{{.workspaces.workspace_id}}/agents
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
    vars:
      first_agent_id:
        from: result.bodyjson.data.data0.id
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.data.__Len__ ShouldEqual 2
    - result.bodyjson.data.data0.name ShouldEqual Research
    - result.bodyjson.data.data0.role ShouldEqual researcher
    - result.bodyjson.data.data0.status ShouldEqual online
    - result.bodyjson.data.data0.hasUpdate ShouldEqual false
    - result.bodyjson.data.data1.name ShouldEqual Writer
    - result.bodyjson.data.data1.role ShouldEqual writer
    - result.bodyjson.data.data1.status ShouldEqual online

- name: conversations_list
  steps:
  - type: http
    method: GET
    url: http://127.0.0.1:7171/v1/workspaces/{{.workspaces.workspace_id}}/conversations
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
    vars:
      conversation_id:
        from: result.bodyjson.data.data0.id
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.data.__Len__ ShouldEqual 1
    - result.bodyjson.data.data0.type ShouldEqual swarm
    - result.bodyjson.data.data0.title ShouldEqual My Swarm
    - result.bodyjson.data.data0.unreadCount ShouldEqual 0

- name: conversation_get
  steps:
  - type: http
    method: GET
    url: http://127.0.0.1:7171/v1/workspaces/{{.workspaces.workspace_id}}/conversations/{{.conversations_list.conversation_id}}
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.data.id ShouldEqual {{.conversations_list.conversation_id}}
    - result.bodyjson.data.type ShouldEqual swarm
    - result.bodyjson.data.title ShouldEqual My Swarm

- name: messages_initial
  steps:
  - type: http
    method: GET
    url: http://127.0.0.1:7171/v1/workspaces/{{.workspaces.workspace_id}}/conversations/{{.conversations_list.conversation_id}}/messages
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.data.__Len__ ShouldEqual 0
    - result.bodyjson.pagination.hasNext ShouldEqual false
    - result.bodyjson.pagination.hasPrev ShouldEqual false
    - result.bodyjson.pagination.nextScrollId ShouldEqual ""
    - result.bodyjson.pagination.prevScrollId ShouldEqual ""

- name: send_message
  steps:
  - type: http
    method: POST
    url: http://127.0.0.1:7171/v1/workspaces/{{.workspaces.workspace_id}}/conversations/{{.conversations_list.conversation_id}}/messages
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
      Content-Type: application/json
    body: |
      {
        "localId": "37c531c3-0bc6-4d0e-bf7c-e6a0a7cc35f5",
        "content": {
          "type": "text",
          "text": "hello from venom"
        },
        "attachments": []
      }
    vars:
      reply_message_id:
        from: result.bodyjson.data.id
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.data.conversationId ShouldEqual {{.conversations_list.conversation_id}}
    - result.bodyjson.data.role ShouldEqual agent
    - result.bodyjson.data.status ShouldEqual delivered
    - result.bodyjson.data.content.type ShouldEqual text
    - result.bodyjson.data.content.text ShouldContainSubstring FakeRuntimeReply
    - result.bodyjson.data.agent.name ShouldEqual Research
    - result.bodyjson.data.agent.role ShouldEqual researcher

- name: messages_after_send
  steps:
  - type: http
    method: GET
    url: http://127.0.0.1:7171/v1/workspaces/{{.workspaces.workspace_id}}/conversations/{{.conversations_list.conversation_id}}/messages
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.data.__Len__ ShouldEqual 2
    - result.bodyjson.data.data0.role ShouldEqual agent
    - result.bodyjson.data.data0.content.type ShouldEqual text
    - result.bodyjson.data.data0.content.text ShouldContainSubstring FakeRuntimeReply
    - result.bodyjson.data.data1.role ShouldEqual user
    - result.bodyjson.data.data1.localId ShouldEqual 37c531c3-0bc6-4d0e-bf7c-e6a0a7cc35f5
    - result.bodyjson.data.data1.content.type ShouldEqual text
    - result.bodyjson.data.data1.content.text ShouldEqual hello from venom
    - result.bodyjson.pagination.hasNext ShouldEqual false
    - result.bodyjson.pagination.hasPrev ShouldEqual false

- name: conversation_after_send
  steps:
  - type: http
    method: GET
    url: http://127.0.0.1:7171/v1/workspaces/{{.workspaces.workspace_id}}/conversations/{{.conversations_list.conversation_id}}
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
    assertions:
    - result.statuscode ShouldEqual 200
    - result.bodyjson.data.lastMessage.role ShouldEqual agent
    - result.bodyjson.data.lastMessage.content.text ShouldContainSubstring FakeRuntimeReply

- name: db_state_after_chat_flow
  steps:
  - type: sql
    driver: postgres
    dsn: postgres://postgres:postgres@127.0.0.1:5432/crawbl?sslmode=disable&search_path=orchestrator
    commands:
      - "SELECT COUNT(*) AS agents_count FROM agents WHERE workspace_id = '{{.workspaces.workspace_id}}';"
      - "SELECT COUNT(*) AS conversations_count FROM conversations WHERE workspace_id = '{{.workspaces.workspace_id}}';"
      - "SELECT role, status, local_id FROM messages WHERE conversation_id = '{{.conversations_list.conversation_id}}' ORDER BY created_at ASC, id ASC;"
    assertions:
    - result.queries.__Len__ ShouldEqual 3
    - result.queries.queries0.rows.rows0.agents_count ShouldEqual 2
    - result.queries.queries1.rows.rows0.conversations_count ShouldEqual 1
    - result.queries.queries2.rows.__Len__ ShouldEqual 2
    - result.queries.queries2.rows.rows0.role ShouldEqual user
    - result.queries.queries2.rows.rows0.status ShouldEqual delivered
    - result.queries.queries2.rows.rows0.local_id ShouldEqual 37c531c3-0bc6-4d0e-bf7c-e6a0a7cc35f5
    - result.queries.queries2.rows.rows1.role ShouldEqual agent
    - result.queries.queries2.rows.rows1.status ShouldEqual delivered

- name: db_state_after_auth_flow
  steps:
  - type: sql
    driver: postgres
    dsn: postgres://postgres:postgres@127.0.0.1:5432/crawbl?sslmode=disable&search_path=orchestrator
    commands:
      - "SELECT email, nickname, name, surname, country_code, has_agreed_with_terms, has_agreed_with_privacy_policy, is_banned FROM users WHERE subject = 'test-user';"
      - "SELECT platform_theme, platform_language, currency_code FROM user_preferences WHERE user_id = (SELECT id FROM users WHERE subject = 'test-user');"
      - "SELECT push_token FROM user_push_tokens WHERE user_id = (SELECT id FROM users WHERE subject = 'test-user');"
      - "SELECT name FROM workspaces WHERE user_id = (SELECT id FROM users WHERE subject = 'test-user') ORDER BY created_at ASC LIMIT 1;"
    assertions:
    - result.queries.__Len__ ShouldEqual 4
    - result.queries.queries0.rows.rows0.email ShouldEqual test@example.com
    - result.queries.queries0.rows.rows0.nickname ShouldEqual bezhan
    - result.queries.queries0.rows.rows0.name ShouldEqual Bezhan
    - result.queries.queries0.rows.rows0.surname ShouldEqual H
    - result.queries.queries0.rows.rows0.country_code ShouldEqual CY
    - result.queries.queries0.rows.rows0.has_agreed_with_terms ShouldEqual true
    - result.queries.queries0.rows.rows0.has_agreed_with_privacy_policy ShouldEqual true
    - result.queries.queries0.rows.rows0.is_banned ShouldEqual false
    - result.queries.queries1.rows.rows0.platform_theme ShouldEqual dark
    - result.queries.queries1.rows.rows0.platform_language ShouldEqual en
    - result.queries.queries1.rows.rows0.currency_code ShouldEqual EUR
    - result.queries.queries2.rows.rows0.push_token ShouldEqual test-push-token
    - result.queries.queries3.rows.rows0.name ShouldEqual My Swarm

- name: delete_account
  steps:
  - type: http
    method: DELETE
    url: http://127.0.0.1:7171/v1/auth/delete
    headers:
      X-Token: dev:test-user:test@example.com:Test User
      X-Device-Info: venom-test-device
      X-Device-ID: venom-test-device-id
      X-Version: 0.1.0+test
      X-Timezone: UTC
      Content-Type: application/json
    body: |
      {
        "reason": "cleanup",
        "description": "venom delete verification"
      }
    assertions:
    - result.statuscode ShouldEqual 204

- name: db_state_after_delete
  steps:
  - type: sql
    driver: postgres
    dsn: postgres://postgres:postgres@127.0.0.1:5432/crawbl?sslmode=disable&search_path=orchestrator
    commands:
      - "SELECT deleted_at IS NOT NULL AS is_deleted FROM users WHERE subject = 'test-user';"
    assertions:
    - result.queries.__Len__ ShouldEqual 1
    - result.queries.queries0.rows.rows0.is_deleted ShouldEqual true
