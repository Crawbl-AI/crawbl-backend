config:
  crawbl:environment: dev
  crawbl:region: fra1
  crawbl:cluster:
    manageVPC: false
    vpcIPRange: "10.10.0.0/16"
    autoUpgrade: true
    surgeUpgrade: true
    highAvailability: false
    destroyAllAssociatedResources: false
    maintenanceDay: sunday
    maintenanceStartTime: "04:00"
    nodePoolName: platform
    nodeSize: s-2vcpu-4gb
    nodeCount: 1
    nodeLabels: {}
    tags:
      - crawbl
      - dev
    manageRegistry: false
    registryName: crawbl
    registrySubscriptionTier: starter
    createProject: false
  crawbl:edge:
    cloudflareZoneName: crawbl.com
    dnsRecordName: dev.api.crawbl.com
    acmeEmail: admin@crawbl.com
    gatewayName: public-edge
    gatewayNamespace: envoy-gateway-system
    gatewayClassName: envoy-gateway-class
    gatewayListenerName: https
    clusterIssuerName: letsencrypt-cloudflare
    acmeServer: "https://acme-v02.api.letsencrypt.org/directory"
    gatewayTLSSecretName: public-edge-tls
    dnsRecordTTL: 120
    dnsRecordProxied: false
    certManagerNamespace: cert-manager
    cloudflareSecretName: cloudflare-api-token
    cloudflareSecretKey: api-token
