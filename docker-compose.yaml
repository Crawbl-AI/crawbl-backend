services:
  orchestrator:
    build:
      context: .
      dockerfile: dockerfiles/platform.dockerfile
      args:
        GOARCH: amd64
    env_file: ${ENV_FILE}
    command: ["platform", "orchestrator"]
    profiles:
      - default
    networks:
      - crawbl-backend
    ports:
      - "${CRAWBL_SERVER_PORT}:${CRAWBL_SERVER_PORT}"
    restart: unless-stopped
    depends_on:
      postgresdb:
        condition: service_healthy

  migrations:
    build:
      context: .
      dockerfile: dockerfiles/platform.dockerfile
    env_file:
      - ${ENV_FILE}
    command: ["platform", "orchestrator", "migrate", "--svc=orchestrator"]
    networks:
      - crawbl-backend
    profiles:
      - migration
    depends_on:
      postgresdb:
        condition: service_healthy

  postgresdb:
    image: pgvector/pgvector:pg16
    expose:
      - "5432"
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - crawbl-backend
    profiles:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    ports:
      - "6379:6379"
    networks:
      - crawbl-backend
    profiles:
      - database
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # crawbl-agent-runtime is the per-workspace agent runtime pod that
  # hosts the Crawbl multi-agent swarm (Manager + Wally + Eve) behind
  # gRPC on port 42618. Opt-in profile — NOT part of the default stack.
  # Run the full local pipeline with:
  #
  #   set -a && source .env && set +a
  #   docker compose --profile default --profile database --profile agent-runtime up
  #
  # Depends on postgresdb (durable agent_memories store) and redis (ADK
  # session service). Both health-gated so the runtime boots only after
  # its backends are ready. The orchestrator must also be reachable at
  # CRAWBL_MCP_ENDPOINT before startup — the workspace blueprint is
  # fetched at boot and a failure is fatal.
  #
  # CRAWBL_WORKSPACE_ID / CRAWBL_USER_ID / CRAWBL_ORCHESTRATOR_ENDPOINT /
  # CRAWBL_MCP_ENDPOINT / CRAWBL_MCP_SIGNING_KEY / OPENAI_API_KEY /
  # CRAWBL_DATABASE_* / CRAWBL_REDIS_ADDR are REQUIRED and must be set
  # in .env before bringing the service up — config.Validate fails
  # fast on missing values.
  agent-runtime:
    build:
      context: .
      dockerfile: dockerfiles/agent-runtime.dockerfile
    env_file: ${ENV_FILE}
    environment:
      - CRAWBL_DATABASE_HOST=postgresdb
      - CRAWBL_DATABASE_PORT=5432
      - CRAWBL_DATABASE_USER=${POSTGRES_USER}
      - CRAWBL_DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - CRAWBL_DATABASE_NAME=${POSTGRES_DB}
      - CRAWBL_DATABASE_SCHEMA=orchestrator
      - CRAWBL_DATABASE_SSLMODE=disable
      - CRAWBL_REDIS_ADDR=redis:6379
    command:
      - "--grpc-listen=:42618"
    profiles:
      - agent-runtime
    networks:
      - crawbl-backend
    ports:
      - "42618:42618"
    depends_on:
      postgresdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:

networks:
  crawbl-backend:
    driver: bridge
