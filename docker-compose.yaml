services:
  orchestrator:
    build:
      context: .
      dockerfile: dockerfiles/platform.dockerfile
      args:
        GOARCH: amd64
    env_file: ${ENV_FILE}
    command: ["platform", "orchestrator"]
    profiles:
      - default
    networks:
      - crawbl-backend
    ports:
      - "${CRAWBL_SERVER_PORT}:${CRAWBL_SERVER_PORT}"
    restart: unless-stopped
    depends_on:
      postgresdb:
        condition: service_healthy

  migrations:
    build:
      context: .
      dockerfile: dockerfiles/platform.dockerfile
    env_file:
      - ${ENV_FILE}
    command: ["platform", "orchestrator", "migrate", "--svc=orchestrator"]
    networks:
      - crawbl-backend
    profiles:
      - migration
    depends_on:
      postgresdb:
        condition: service_healthy

  postgresdb:
    image: postgres:16.1
    expose:
      - "5432"
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - crawbl-backend
    profiles:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db-data:

networks:
  crawbl-backend:
    driver: bridge
